name: Daily rollover

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily rollover endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET fehlt."
            exit 1
          fi

          DAILY_CRON_URL="https://mijija.vercel.app/api/cron/daily-rollover"
          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "${DAILY_CRON_URL}"
          )"

          echo "Daily rollover HTTP ${status_code}"
          cat "$response_file"
          echo

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi
