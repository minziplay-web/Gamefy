name: Daily rollover

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily rollover endpoint
        env:
          DAILY_CRON_URL: ${{ secrets.DAILY_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DAILY_CRON_URL" ]; then
            echo "DAILY_CRON_URL fehlt."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET fehlt."
            exit 1
          fi

          curl --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${DAILY_CRON_URL}"
